# ═══ NEXUS BACKEND CONFIG ═══
# Copy this file to application-local.properties and fill in real values

# Server
server.port=8080
spring.application.name=nexus-backend

# MongoDB
# Local: mongodb://localhost:27017/nexusdb
# Atlas: mongodb+srv://username:password@cluster.mongodb.net/nexusdb
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/nexusdb}

# JWT Secret (min 32 chars, use a random string in production)
jwt.secret=${JWT_SECRET:nexus-super-secret-key-change-in-production-2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Admin seed account (created on first startup)
admin.email=admin@gmail.com
admin.password=Admin@123
admin.name=Admin

# CORS - set your Vercel frontend URL in production
app.cors.origins=http://localhost:5173

# Logging
logging.level.com.nexus=DEBUG
logging.level.org.springframework.security=WARN
