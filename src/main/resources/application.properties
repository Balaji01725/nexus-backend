server.port=${PORT:8080}
spring.application.name=nexus-backend

spring.data.mongodb.uri=${MONGODB_URI}

jwt.secret=${JWT_SECRET:nexus-super-secret-key-change-in-production-2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

admin.email=${ADMIN_EMAIL:admin@gmail.com}
admin.password=${ADMIN_PASSWORD:Admin@123}
admin.name=${ADMIN_NAME:Admin}

app.cors.origins=${CORS_ORIGINS:http://localhost:5173}

logging.level.com.nexus=DEBUG
logging.level.org.springframework.security=WARN